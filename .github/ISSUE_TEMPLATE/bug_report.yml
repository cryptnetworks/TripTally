name: Bug report
description: Report a reproducible TripTally bug.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, Docker image tag, deployment mode, and relevant config.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Remove secrets, tokens, passwords, and private URLs before posting.
      render: shell
