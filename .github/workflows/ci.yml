name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: file:./dev.db
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ci-secret-that-is-long-enough-for-tests
      TOKEN_DIGEST_SECRET: ci-token-digest-secret-for-tests
      SMTP_ENABLED: "false"
      PASSWORD_RESET_TOKEN_MINUTES: "45"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate environment
        run: npm run validate:config

      - name: Generate Prisma Client
        run: npm run prisma:generate

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Unit and integration tests
        run: npm test

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Browser smoke tests
        env:
          DATABASE_URL: file:./playwright.db
          NEXTAUTH_URL: http://127.0.0.1:3000
          PUBLIC_APP_URL: http://127.0.0.1:3000
          NEXTAUTH_SECRET: ci-playwright-nextauth-secret
          TOKEN_DIGEST_SECRET: ci-playwright-token-digest-secret
          AUTH_CONFIG_ENCRYPTION_KEY: ci-playwright-auth-config-key
          SMTP_ENABLED: "false"
          TEST_OAUTH_PROVIDER_ENABLED: "true"
        run: npm run test:e2e -- --project=Chromium --project='Mobile Safari'

      - name: Production build
        run: npm run build

      - name: Docker build
        run: docker build -t triptally:ci .
