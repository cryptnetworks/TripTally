services:
  triptally:
    build:
      context: .
    image: triptally:latest
    container_name: triptally
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: 0.0.0.0
      TRIPTALLY_DOCKER: "1"
      # Keep SQLite inside the mounted volume even when the local .env uses file:./dev.db.
      TRIPTALLY_SQLITE_PATH: /app/data/triptally.db
      TRIPTALLY_ALLOW_INSECURE_SECRET: ${TRIPTALLY_ALLOW_INSECURE_SECRET:-}
    expose:
      - "3000"
    volumes:
      - triptally_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: triptally-nginx
    profiles:
      - nginx
    depends_on:
      triptally:
        condition: service_healthy
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    command: >
      /bin/sh -c "rm -f /etc/nginx/conf.d/default.conf
      && /docker-entrypoint.sh nginx -g 'daemon off;'"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/triptally.conf:/etc/nginx/templates/triptally.conf.template:ro
      - certbot_etc:/etc/letsencrypt:ro
      - certbot_var:/var/lib/letsencrypt:ro
    restart: unless-stopped

  certbot:
    image: certbot/dns-cloudflare:latest
    container_name: triptally-certbot
    profiles:
      - nginx
    env_file:
      - .env
    volumes:
      - certbot_etc:/etc/letsencrypt
      - certbot_var:/var/lib/letsencrypt
      - ./certbot/cloudflare.ini:/etc/letsencrypt/cloudflare.ini:ro

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: triptally-cloudflared
    profiles:
      - cloudflare
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      triptally:
        condition: service_healthy
    restart: unless-stopped

volumes:
  triptally_data:
  certbot_etc:
  certbot_var:
